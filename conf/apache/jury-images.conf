# Serve locally cached jury images and fall back to upload.wikimedia.org for missing files.
#
# Set wlxjury.thumbs.host to this server's hostname in application.conf.

<VirtualHost *:80>
    DocumentRoot /var/www/jury-images

    <Directory /var/www/jury-images>
        Options -Indexes
        AllowOverride None
        Require all granted
        Header set Cache-Control "public, max-age=2592000"
    </Directory>

    # Serve from local cache if available, otherwise proxy to Wikimedia.
    # Use DOCUMENT_ROOT+REQUEST_URI rather than REQUEST_FILENAME because Apache may
    # split the URL at a .jpg directory boundary (treating it as PATH_INFO), causing
    # REQUEST_FILENAME to resolve only to the directory, not the full file path.
    RewriteEngine On
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-f
    RewriteRule ^(/wikipedia/commons/thumb/.+)$ https://upload.wikimedia.org$1 [P,L,E=PROXIED:1]

    # Custom header so tests can distinguish local-disk vs Wikimedia-proxied responses.
    # Uses X-Jury-Cache (not X-Cache) to avoid conflicts with upstream CDN X-Cache headers.
    Header always set X-Jury-Cache "local"
    Header always set X-Jury-Cache "proxied" env=PROXIED

    SSLProxyEngine On
    ProxyPassReverse / https://upload.wikimedia.org/
    RequestHeader set User-Agent "WLXJury/1.0 (https://commons.wikimedia.org/wiki/Commons:WLX_Jury_Tool; intracer@gmail.com)"
</VirtualHost>
