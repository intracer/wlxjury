# Serve locally cached jury images and fall back to upload.wikimedia.org for missing files.
#
# Setup:
#   a2enmod proxy proxy_http rewrite headers
#   a2enconf jury-images
#   systemctl reload apache2
#
# Set wlxjury.thumbs.host to this server's hostname in application.conf.

Alias /wikipedia/commons/thumb /var/www/jury-images/wikipedia/commons/thumb

<Directory /var/www/jury-images/wikipedia/commons/thumb>
    Options -Indexes
    AllowOverride None
    Require all granted
    Header set Cache-Control "public, max-age=2592000"
</Directory>

# Fall back to upload.wikimedia.org for any file not yet downloaded locally
<Location /wikipedia/commons/thumb>
    RewriteEngine On
    RewriteCond /var/www/jury-images%{REQUEST_FILENAME} !-f
    RewriteRule ^/wikipedia/commons/thumb/(.*)$ \
        https://upload.wikimedia.org/wikipedia/commons/thumb/$1 [P,L]
    ProxyPassReverse https://upload.wikimedia.org/
    RequestHeader set User-Agent "WLXJury/1.0 (https://commons.wikimedia.org/wiki/Commons:WLX_Jury_Tool; intracer@gmail.com)"
</Location>
