# Serve locally cached jury images and fall back to upload.wikimedia.org for missing files.
#
# Set wlxjury.thumbs.host to this server's hostname in application.conf.

<VirtualHost *:80>
    DocumentRoot /var/www/jury-images

    <Directory /var/www/jury-images>
        Options -Indexes
        AllowOverride None
        Require all granted
        Header set Cache-Control "public, max-age=2592000"
    </Directory>

    # Serve from local cache if available, otherwise proxy to Wikimedia.
    # REQUEST_FILENAME is set correctly in VirtualHost context via DocumentRoot mapping.
    RewriteEngine On
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteRule ^(/wikipedia/commons/thumb/.+)$ https://upload.wikimedia.org$1 [P,L]

    SSLProxyEngine On
    ProxyPassReverse / https://upload.wikimedia.org/
    RequestHeader set User-Agent "WLXJury/1.0 (https://commons.wikimedia.org/wiki/Commons:WLX_Jury_Tool; intracer@gmail.com)"
</VirtualHost>
